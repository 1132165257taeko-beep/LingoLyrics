<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lyric Learner — Billion Beats</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,Helvetica,Arial;margin:18px;background:#fff;color:#111}
    .container{max-width:920px;margin:0 auto}
    .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px}
    .lyrics{height:420px;overflow:auto;border:1px solid #e6e6e6;padding:12px;background:#fafafa}
    .line{padding:6px 4px;transition:background .12s}
    .line.current{background:#fff7cc;font-weight:600}
    .time{color:#666;font-size:0.95em;margin-bottom:8px}
    button,select{font:inherit}
    .meta{color:#444;margin-bottom:6px}
  </style>
</head>
<body>
  <div class="container">
    <h2 id="title">Loading…</h2>

    <div class="meta" id="meta"></div>

    <div class="controls">
      <audio id="audio" preload="metadata" controls style="min-width:280px"></audio>

      <label>Speed:
        <select id="speed"><option>0.75</option><option>0.9</option><option selected>1</option><option>1.25</option><option>1.5</option></select>
      </label>

      <label style="margin-left:8px"><input type="checkbox" id="showTranslation"> Show translation</label>

      <button id="markLoop">Set loop start</button>
      <button id="clearLoop">Clear loop</button>
    </div>

    <div class="time"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></div>

    <div style="margin:8px 0">
      <button id="prevLine">◀ Prev</button>
      <button id="nextLine">Next ▶</button>
      <button id="downloadSRT">Export SRT</button>
    </div>

    <div class="lyrics" id="lyrics">Loading lyrics…</div>
  </div>

<script>
  // Config: update filenames if you changed them
  const audioFile = 'billion-beats.mp3';
  const lrcFile = 'lyrics.lrc';
  const tlLrcFile = 'translation.lrc';
  const metaFile = 'metadata.json';

  const audio = document.getElementById('audio');
  const lyricsEl = document.getElementById('lyrics');
  const curTimeEl = document.getElementById('curTime');
  const durTimeEl = document.getElementById('durTime');
  const speedSel = document.getElementById('speed');
  const showTranslation = document.getElementById('showTranslation');
  const titleEl = document.getElementById('title');
  const metaEl = document.getElementById('meta');
  const prevLineBtn = document.getElementById('prevLine');
  const nextLineBtn = document.getElementById('nextLine');
  const downloadSRTBtn = document.getElementById('downloadSRT');

  let cues = []; // {time, text, translation}
  let loopStart = null, loopEnd = null;

  function fmt(s){
    if(!isFinite(s)) return '00:00';
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
  }

  async function load(){
    // load metadata if present
    try{
      const m = await fetch(metaFile);
      if(m.ok){
        const js = await m.json();
        titleEl.textContent = js.title + ' — ' + js.artist;
        metaEl.textContent = `Language: ${js.language || ''} · Duration: ${js.duration || ''}`;
      }
    }catch(e){/*ignore*/}

    audio.src = audioFile;
    audio.addEventListener('loadedmetadata', ()=>{
      durTimeEl.textContent = fmt(audio.duration);
    });

    const [lrcText, tlText] = await Promise.all([
      fetch(lrcFile).then(r=>r.ok? r.text() : ''),
      fetch(tlLrcFile).then(r=>r.ok? r.text() : '')
    ]);

    const baseCues = parseLRC(lrcText);
    const tlCues = parseLRC(tlText);

    // align by time if possible, else by index
    cues = baseCues.map((c,i)=>({
      time: c.time,
      text: c.text,
      translation: findTranslationForTime(c.time, tlCues) || (tlCues[i] && tlCues[i].text) || ''
    }));

    renderLyrics();
  }

  function parseLRC(text){
    if(!text) return [];
    const lines = text.split(/\r?\n/);
    const out = [];
    const timeRe = /\[(\d{1,2}):(\d{2}(?:\.\d{1,2})?)\]/g;
    for(const ln of lines){
      let m;
      const times = [];
      while((m = timeRe.exec(ln)) !== null){
        const min = parseInt(m[1],10), sec = parseFloat(m[2]);
        times.push(min*60 + sec);
      }
      const txt = ln.replace(timeRe,'').trim();
      for(const t of times){ out.push({time:t, text:txt}); }
    }
    return out.sort((a,b)=>a.time-b.time);
  }

  function findTranslationForTime(t, tlCues){
    if(!tlCues || !tlCues.length) return '';
    // find nearest within 1s
    let best = null, bestDiff = 1e9;
    for(const c of tlCues){
      const d = Math.abs(c.time - t);
      if(d < bestDiff){ bestDiff = d; best = c; }
    }
    return bestDiff <= 1 ? (best && best.text) : '';
  }

  function renderLyrics(){
    lyricsEl.innerHTML = '';
    if(!cues.length){ lyricsEl.textContent = 'No LRC lyrics found.'; return; }
    for(let i=0;i<cues.length;i++){
      const c = cues[i];
      const div = document.createElement('div');
      div.className = 'line';
      div.dataset.index = i;
      div.dataset.time = c.time;
      const t = document.createElement('div'); t.textContent = c.text;
      const tr = document.createElement('div'); tr.style.color='#666'; tr.style.fontSize='0.95em';
      tr.style.display = showTranslation.checked ? 'block':'none'; tr.textContent = c.translation;
      div.appendChild(t); div.appendChild(tr);
      div.addEventListener('click', ()=>{ audio.currentTime = c.time; audio.play(); });
      lyricsEl.appendChild(div);
    }
  }

  function findCurrentIndex(time){
    for(let i=cues.length-1;i>=0;i--){ if(time >= cues[i].time - 0.25) return i; }
    return 0;
  }

  audio.addEventListener('timeupdate', ()=>{
    const t = audio.currentTime;
    curTimeEl.textContent = fmt(t);
    if(loopStart !== null && loopEnd !== null){ if(t > loopEnd + 0.2){ audio.currentTime = loopStart; audio.play(); } }
    const idx = findCurrentIndex(t);
    document.querySelectorAll('.line.current').forEach(el=>el.classList.remove('current'));
    const el = document.querySelector('.line[data-index="'+idx+'"]');
    if(el){ el.classList.add('current'); const top = el.offsetTop - lyricsEl.clientHeight/2 + el.clientHeight/2; lyricsEl.scrollTo({top, behavior:'smooth'}); }
  });

  speedSel.addEventListener('change', ()=> audio.playbackRate = parseFloat(speedSel.value));
  showTranslation.addEventListener('change', ()=> { document.querySelectorAll('.line').forEach(div=>{ div.children[1].style.display = showTranslation.checked ? 'block':'none'; }); });

  document.getElementById('markLoop').addEventListener('click', ()=>{
    if(loopStart === null){ loopStart = audio.currentTime; alert('Loop start set at '+fmt(loopStart)+'. Press "Set loop start" again to set end.'); document.getElementById('markLoop').textContent = 'Set loop end'; }
    else if(loopEnd === null){ loopEnd = audio.currentTime; alert('Loop end set at '+fmt(loopEnd)); document.getElementById('markLoop').textContent = 'Set loop start'; loopStart = null; loopEnd = null; }
  });

  document.getElementById('clearLoop').addEventListener('click', ()=>{ loopStart = loopEnd = null; alert('Loop cleared'); });

  prevLineBtn.addEventListener('click', ()=>{
    const idx = Math.max(0, findCurrentIndex(audio.currentTime)-1); audio.currentTime = cues[idx].time; audio.play();
  });
  nextLineBtn.addEventListener('click', ()=>{
    const idx = Math.min(cues.length-1, findCurrentIndex(audio.currentTime)+1); audio.currentTime = cues[idx].time; audio.play();
  });

  downloadSRTBtn.addEventListener('click', ()=>{
    if(!cues.length) return alert('No cues');
    let srt = '';
    for(let i=0;i<cues.length;i++){
      const start = cues[i].time; const end = (i+1<cues.length? cues[i+1].time : start+5);
      srt += (i+1)+'\n'+toSRTTime(start)+' --> '+toSRTTime(end)+'\n'+cues[i].text+'\n\n';
    }
    const blob = new Blob([srt],{type:'text/plain'}); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'lyrics.srt'; a.click(); URL.revokeObjectURL(url);
  });

  function toSRTTime(s){
    const h = Math.floor(s/3600); const m = Math.floor((s%3600)/60); const sec = Math.floor(s%60); const ms = Math.floor((s - Math.floor(s))*1000);
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')+','+String(ms).padStart(3,'0');
  }

  // init
  load();
</script>
</body>
</html>
